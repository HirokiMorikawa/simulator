name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  native:
    name: fmt / clippy / test (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test (全ドメインの解析解テスト・決定論テスト)
        run: cargo test --workspace
      - name: cargo bench --test (ホットパスベンチの動作確認、性能ベンチ回帰ゲートの前段)
        # `--test`は統計的サンプリングをせず1回だけ実行してパニックしないことのみ
        # 検証する(高速・CI向け)。実測値の履歴比較による真の回帰検知は、ベースライン
        # 永続化の仕組み(直近mainブランチの実行結果をキャッシュ/アーティファクト化
        # する等)が未導入のため後続増分(docs/22-roadmap/02-feature-checklist.md参照)。
        run: cargo bench --workspace -- --test

  wasm:
    name: wasm-pack build (sim-wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: wasm-pack build
        run: wasm-pack build crates/sim-wasm --target web --out-dir ../../demo/pkg
      - uses: actions/upload-artifact@v4
        with:
          name: sim-wasm-pkg
          path: demo/pkg

  demo:
    name: demo build (Vite)
    runs-on: ubuntu-latest
    needs: wasm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: demo/package-lock.json
      - uses: actions/download-artifact@v4
        with:
          name: sim-wasm-pkg
          path: demo/pkg
      - name: npm ci
        working-directory: demo
        run: npm ci
      - name: npm run build
        working-directory: demo
        run: npm run build
